<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - FreshMart</title>
<link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
<script>(function(){var t=localStorage.getItem('freshmart-theme')||'light';if(t==='dark')document.documentElement.classList.add('dark');else document.documentElement.classList.remove('dark');})();</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        primary: '#22C55E',
        secondary: '#16A34A',
        accent: '#F59E0B',
      },
      fontFamily: {
        heading: ['Poppins', 'sans-serif'],
        body: ['Inter', 'sans-serif'],
      }
    }
  }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.float{animation:float 3s ease-in-out infinite}
@keyframes pulse-ring{0%{transform:scale(.8);opacity:1}100%{transform:scale(1.4);opacity:0}}
.pulse-ring{animation:pulse-ring 2s ease-out infinite}
@keyframes fade-in-up{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fade-in-up .7s ease forwards}
.fade-in-d1{animation-delay:.1s;opacity:0}
.fade-in-d2{animation-delay:.25s;opacity:0}
.fade-in-d3{animation-delay:.4s;opacity:0}
.fade-in-d4{animation-delay:.55s;opacity:0}
</style>
</head>
<body class="bg-white dark:bg-black font-body text-gray-800 dark:text-gray-200">

<section class="relative min-h-screen flex items-center justify-center overflow-hidden px-4">
  <!-- Decorative background elements -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-secondary/5 rounded-full blur-3xl"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/3 rounded-full blur-3xl"></div>
  </div>

  <!-- Floating grocery icons -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-[15%] left-[10%] text-5xl opacity-10 dark:opacity-5 float" style="animation-delay:0s">🍎</div>
    <div class="absolute top-[20%] right-[12%] text-4xl opacity-10 dark:opacity-5 float" style="animation-delay:.5s">🥦</div>
    <div class="absolute bottom-[25%] left-[15%] text-4xl opacity-10 dark:opacity-5 float" style="animation-delay:1s">🧀</div>
    <div class="absolute bottom-[20%] right-[10%] text-5xl opacity-10 dark:opacity-5 float" style="animation-delay:1.5s">🍞</div>
    <div class="absolute top-[40%] left-[5%] text-3xl opacity-10 dark:opacity-5 float" style="animation-delay:.8s">🥛</div>
    <div class="absolute top-[35%] right-[5%] text-3xl opacity-10 dark:opacity-5 float" style="animation-delay:1.2s">🥚</div>
  </div>

  <div class="relative z-10 text-center max-w-3xl mx-auto">
    <!-- Animated 404 with ring -->
    <div class="relative inline-block mb-2">
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="w-48 h-48 sm:w-64 sm:h-64 rounded-full border-2 border-primary/30 pulse-ring"></div>
      </div>
      <div class="absolute inset-0 flex items-center justify-center">
        <div class="w-40 h-40 sm:w-56 sm:h-56 rounded-full bg-primary/5"></div>
      </div>
      <p class="font-heading font-black text-[8rem] sm:text-[11rem] md:text-[14rem] leading-none text-primary select-none float relative drop-shadow-lg">404</p>
    </div>

    <!-- Main content -->
    <div class="fade-in fade-in-d1">
      <h1 class="font-heading font-extrabold text-4xl sm:text-5xl md:text-6xl text-gray-800 dark:text-white mb-4">Page Not Found</h1>
    </div>
    <div class="fade-in fade-in-d2">
      <p class="text-gray-500 dark:text-gray-400 text-lg max-w-md mx-auto mb-10 leading-relaxed">Looks like this page took a grocery trip and never came back. Let's get you home.</p>
    </div>

    <!-- Search bar -->
    <div class="fade-in fade-in-d3 mb-10">
      <div class="bg-gray-100 dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-2xl p-3 max-w-lg mx-auto">
        <form class="flex gap-3" onsubmit="window.location.href='shop.html';return false;">
          <div class="flex items-center gap-3 flex-1 bg-white dark:bg-gray-800 rounded-xl px-5 py-3 border border-gray-100 dark:border-gray-700">
            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input type="text" placeholder="Search for products..." class="bg-transparent text-gray-800 dark:text-white placeholder-gray-400 focus:outline-none w-full font-body text-sm">
          </div>
          <button type="submit" class="bg-primary hover:bg-secondary text-white px-6 py-3 rounded-xl font-heading font-bold transition-all shadow-md hover:shadow-lg hover:shadow-primary/25 text-sm whitespace-nowrap">Search</button>
        </form>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="fade-in fade-in-d4 flex flex-col sm:flex-row items-center justify-center gap-4 mb-16">
      <a href="index.html" class="inline-flex items-center gap-2.5 bg-primary hover:bg-secondary text-white font-heading font-bold px-10 py-4 rounded-full transition-all shadow-lg shadow-primary/25 hover:shadow-primary/40 hover:-translate-y-0.5 text-sm">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Back to Home
      </a>
      <a href="shop.html" class="inline-flex items-center gap-2.5 border-2 border-primary text-primary hover:bg-primary hover:text-white font-heading font-bold px-10 py-4 rounded-full transition-all hover:-translate-y-0.5 text-sm">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/></svg>
        Browse Shop
      </a>
    </div>

    <!-- Quick links -->
    <div class="fade-in fade-in-d4">
      <p class="text-gray-400 dark:text-gray-500 text-xs font-semibold uppercase tracking-wider mb-4">Quick Links</p>
      <div class="flex flex-wrap items-center justify-center gap-3">
        <a href="weekly-deals.html" class="inline-flex items-center gap-1.5 bg-gray-100 dark:bg-gray-900 hover:bg-primary/10 dark:hover:bg-primary/10 text-gray-600 dark:text-gray-400 hover:text-primary px-4 py-2 rounded-full text-xs font-medium transition-all border border-gray-200 dark:border-gray-800 hover:border-primary/30">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
          Weekly Deals
        </a>
        <a href="departments.html" class="inline-flex items-center gap-1.5 bg-gray-100 dark:bg-gray-900 hover:bg-primary/10 dark:hover:bg-primary/10 text-gray-600 dark:text-gray-400 hover:text-primary px-4 py-2 rounded-full text-xs font-medium transition-all border border-gray-200 dark:border-gray-800 hover:border-primary/30">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
          Departments
        </a>
        <a href="about.html" class="inline-flex items-center gap-1.5 bg-gray-100 dark:bg-gray-900 hover:bg-primary/10 dark:hover:bg-primary/10 text-gray-600 dark:text-gray-400 hover:text-primary px-4 py-2 rounded-full text-xs font-medium transition-all border border-gray-200 dark:border-gray-800 hover:border-primary/30">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          About Us
        </a>
        <a href="contact.html" class="inline-flex items-center gap-1.5 bg-gray-100 dark:bg-gray-900 hover:bg-primary/10 dark:hover:bg-primary/10 text-gray-600 dark:text-gray-400 hover:text-primary px-4 py-2 rounded-full text-xs font-medium transition-all border border-gray-200 dark:border-gray-800 hover:border-primary/30">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          Contact
        </a>
      </div>
    </div>
  </div>
</section>

<script src="assets/js/rtl.js"></script>
<script src="assets/js/theme.js"></script>
</body>
</html>
